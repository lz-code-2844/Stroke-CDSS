# ==================== Model Configuration ====================
# Configure which model each Agent uses and its parameters

# ==================== Global Configuration ====================
global:
  api_key: "my-secret-key"
  api_timeout: 120
  media_base_url: "http://192.168.8.17:8866"

  # Video/Image parameters
  video_max_pixels:  32*32*160  # 32*32*160
  image_max_pixels: 64*64    # 64*64
  video_fps: 1.0
  max_video_count: 4

# ==================== Model Definitions ====================
models:
  # Qwen-VL model - supports vision and text tasks
  qwen_vl:
    name: "qwen3vl_235b_2507"
    base_url: "http://192.168.8.17:9011/v1"
    type: "vision"
    default_params:
      temperature: 0.7
      max_tokens: 4096
      extra_body:
        mm_processor_kwargs:
          fps: 1
          do_sample_frames: true

# ==================== Agent Model Mapping ====================
# Specify which model each Agent uses
# Format: agent_name: model_key
agent_models:
  # Text-only Agents (using Qwen-VL)
  triage: qwen_vl
  time_calc: qwen_vl
  thrombolysis: qwen_vl
  indication: qwen_vl
  thrombectomy: qwen_vl
  summary: qwen_vl
  nihss_scorer: qwen_vl
  fact_extractor: qwen_vl
  consistency_check: qwen_vl
  director: qwen_vl

  # Vision Agents (using Qwen-VL)
  hemorrhage: qwen_vl
  ncct_imaging: qwen_vl
  aneurysm: qwen_vl
  lvo: qwen_vl
  cta_imaging: qwen_vl
  ctp_imaging: qwen_vl
  imaging: qwen_vl

# ==================== Default Model ====================
# If an Agent is not configured above, use this default model
default_model: qwen_vl
